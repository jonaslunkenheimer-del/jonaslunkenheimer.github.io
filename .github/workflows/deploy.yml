name: Deploy Die Meeples

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        env:
          SB_SERVICE_KEY: ${{ secrets.SB_SERVICE_KEY }}
        run: |
          sed -i "s|%%SB_SERVICE_KEY%%|${SB_SERVICE_KEY}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          include_files: index.html

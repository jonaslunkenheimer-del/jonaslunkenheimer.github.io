name: Deploy Spieleabend Planer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Token (split to avoid push protection)
        run: |
          TOKEN="${{ secrets.MEEPLES_TOKEN }}"
          HALF=$(( ${#TOKEN} / 2 ))
          T1="${TOKEN:0:$HALF}"
          T2="${TOKEN:$HALF}"
          sed -i "s/%%GH_TOKEN_P1%%/$T1/g" index.html
          sed -i "s/%%GH_TOKEN_P2%%/$T2/g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
